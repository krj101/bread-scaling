<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread Scaling</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Bread Scaling</h1>
    <nav id="nav"></nav>
  </header>

  <main id="app"></main>

  <footer>
    <button class="secondary" data-action="export">Export data</button>
    <button class="secondary" data-action="import">Import data</button>
    <button class="danger"    data-action="reset">Reset to defaults</button>
    <input type="file" id="import-file" accept=".json" hidden />
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
